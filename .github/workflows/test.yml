name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: graphql_anycable_postgresql_store_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d graphql_anycable_postgresql_store_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GRAPHQL_ANYCABLE_PATH: tmp/graphql-anycable
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/graphql_anycable_postgresql_store_test

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout graphql-anycable interface branch
        uses: actions/checkout@v6
        with:
          repository: TikiTDO/graphql-anycable
          ref: feature/postgres-signalling
          path: tmp/graphql-anycable

      - name: Install PostgreSQL headers
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpq-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec
